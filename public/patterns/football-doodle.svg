<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="100%" height="100%" preserveAspectRatio="xMidYMid slice">
  <defs>
    <symbol id="ball" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="10" stroke="#ffffff" stroke-width="1.5" fill="none"/>
      <path d="M12 2L15 8L21 9L17 14L18 20L12 17L6 20L7 14L3 9L9 8L12 2Z" stroke="#ffffff" stroke-width="1" stroke-linejoin="round" fill="none"/>
    </symbol>
    <symbol id="trophy" viewBox="0 0 24 24">
      <path d="M8 21H16M12 17V21M7 4H17C17 4 19 12 12 17C5 12 7 4 7 4ZM4 4H7V8H4C2.5 8 2.5 4 4 4ZM17 4H20C21.5 4 21.5 8 20 8H17V4Z" stroke="#ffffff" stroke-width="1.5" stroke-linejoin="round" fill="none"/>
    </symbol>
    <symbol id="goal" viewBox="0 0 24 24">
      <path d="M4 22V6C4 4.89543 4.89543 4 6 4H18C19.1046 4 20 4.89543 20 6V22M4 22H20M4 22H2M20 22H2M6 4L4 12M18 4L20 12M8 4V12M16 4V12M12 4V12M4 8H20M4 12H20" stroke="#ffffff" stroke-width="1.5" stroke-linejoin="round" fill="none"/>
    </symbol>
    <symbol id="field" viewBox="0 0 24 24">
      <rect x="2" y="2" width="20" height="20" rx="2" stroke="#ffffff" stroke-width="1.5" fill="none"/>
      <line x1="12" y1="2" x2="12" y2="22" stroke="#ffffff" stroke-width="1.5"/>
      <circle cx="12" cy="12" r="3" stroke="#ffffff" stroke-width="1.5" fill="none"/>
      <rect x="2" y="6" width="4" height="12" stroke="#ffffff" stroke-width="1.5" fill="none"/>
      <rect x="18" y="6" width="4" height="12" stroke="#ffffff" stroke-width="1.5" fill="none"/>
    </symbol>
    <symbol id="tactics" viewBox="0 0 40 40">
      <circle cx="8" cy="8" r="3" stroke="#ffffff" stroke-width="1.5" fill="none" stroke-dasharray="2 1"/>
      <circle cx="32" cy="32" r="3" stroke="#ffffff" stroke-width="1.5" fill="none"/>
      <path d="M11 11 L 28 28" stroke="#ffffff" stroke-width="1.5" stroke-dasharray="4 4" fill="none"/>
      <path d="M24 28 L 29 29 L 28 24" stroke="#ffffff" stroke-width="1.5" fill="none" stroke-linejoin="round"/>
      <path d="M30 8 L 34 12 M 34 8 L 30 12" stroke="#ffffff" stroke-width="1.5" fill="none"/>
    </symbol>
  </defs>
  
  <g color="#ffffff">
    <!-- Huge Watermark Trophy Center -->
    <use href="#trophy" x="50%" y="50%" width="500" height="500" transform="translate(-250, -250)" opacity="0.1" />
    
    <g>
      <!-- Top Left: Ball -->
      <g transform="translate(600, 200)">
        <use href="#ball" x="0" y="0" width="80" height="80" opacity="0.08" />
      </g>
      
      <!-- Top Right: Trophy -->
      <g transform="translate(1250, 220) rotate(10)">
        <use href="#trophy" x="0" y="0" width="90" height="90" opacity="0.08" />
      </g>
      
      <!-- Bottom Left: Goal -->
      <g transform="translate(650, 750) rotate(-5)">
        <use href="#goal" x="0" y="0" width="90" height="90" opacity="0.06" />
      </g>
      
      <!-- Bottom Right: Tactics -->
      <g transform="translate(1200, 750) rotate(15)">
        <use href="#tactics" x="0" y="0" width="100" height="100" opacity="0.06" />
      </g>
      
      <!-- Middle Left Far: Field -->
      <g transform="translate(300, 500) rotate(-10)">
        <use href="#field" x="0" y="0" width="80" height="80" opacity="0.06" />
      </g>
      
      <!-- Middle Right Far: Tactics -->
      <g transform="translate(1600, 450) rotate(25)">
        <use href="#tactics" x="0" y="0" width="120" height="120" opacity="0.06" />
      </g>
    </g>
  </g>
</svg>
